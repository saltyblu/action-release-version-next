name: Unit Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run unit tests with coverage
        run: make coverage
